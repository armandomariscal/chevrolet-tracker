version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chevrolet_tracker_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - chevrolet_db_data:/var/lib/postgresql/data

volumes:
  chevrolet_db_data: